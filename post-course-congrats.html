<style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap');

/* ── Banner ── */
#pa-congrats-banner {
  background: linear-gradient(135deg, #17212B 0%, #3A5672 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px 48px;
  text-align: center;
}

#pa-congrats-logo {
  height: 60px;
  width: auto;
  display: block;
  margin-bottom: 32px;
}

#pa-congrats-heading {
  font-family: 'Open Sans', sans-serif !important;
  font-size: clamp(28px, 5vw, 48px) !important;
  font-weight: 700 !important;
  color: #ffffff !important;
  margin: 0 0 12px 0 !important;
  line-height: 1.15 !important;
}

#pa-congrats-sub {
  font-family: 'Open Sans', sans-serif !important;
  font-size: clamp(14px, 2vw, 17px) !important;
  font-weight: 400 !important;
  color: rgba(255, 255, 255, 0.78) !important;
  margin: 0 !important;
  line-height: 1.6 !important;
  max-width: 500px !important;
}

/* ── Button row ── */
#pa-congrats-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 14px;
  padding: 40px 24px 32px;
  background: #ffffff;
}

.pa-congrats-btn {
  font-family: 'Open Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 4px;
  padding: 14px 28px;
  transition: background-color 0.15s, color 0.15s;
  display: inline-block;
}

/* Primary — dark filled */
.pa-congrats-btn-primary {
  background: #17212B;
  color: #ffffff;
}
.pa-congrats-btn-primary:hover {
  background: #213D4F;
  color: #ffffff;
}

/* Secondary — Academy Yellow */
.pa-congrats-btn-secondary {
  background: #F6B000;
  color: #17212B;
}
.pa-congrats-btn-secondary:hover {
  background: #C48F0A;
  color: #17212B;
}

/* Confetti trigger wrapper — centered row above nav buttons */
#pa-confetti-btn-wrap {
  display: flex;
  justify-content: center;
  padding: 32px 24px 0;
  background: #ffffff;
}

/* Confetti trigger — outlined yellow */
.pa-congrats-btn-confetti {
  background: transparent;
  color: #17212B;
  border: 2px solid #F6B000;
  cursor: pointer;
}
.pa-congrats-btn-confetti:hover {
  background: #F6B000;
  color: #17212B;
}

/* ── Divider ── */
#pa-congrats-divider {
  height: 1px;
  background: #E8ECEF;
  margin: 0 24px;
}

/* ── Responsive ── */
@media only screen and (max-width: 480px) {
  .pa-congrats-btn {
    width: 100%;
    text-align: center;
  }
  #pa-congrats-buttons {
    flex-direction: column;
    align-items: center;
    padding: 32px 20px;
  }
}
</style>

<div id="pa-congrats-banner">
  <img id="pa-congrats-logo"
       src="https://everpath-course-content.s3-accelerate.amazonaws.com/instructor%2Feww6wlnql2k9y5hqbfc2ycpct%2Fpublic%2F1776479064%2Flogo_academytag-reverse.1776479063876.svg"
       alt="Academy by Posit">
  <h1 id="pa-congrats-heading">Congratulations!</h1>
  <p id="pa-congrats-sub">You've completed this course. Use the links below to continue your learning journey.</p>
</div>

<div id="pa-confetti-btn-wrap">
  <button id="pa-confetti-btn" class="pa-congrats-btn pa-congrats-btn-confetti">Fire Confetti</button>
</div>

<div id="pa-congrats-buttons">
  <a class="pa-congrats-btn pa-congrats-btn-primary"
     href="https://academy.posit.co"
     target="_self">Home</a>
  <a class="pa-congrats-btn pa-congrats-btn-secondary"
     href="https://academy.posit.co/page/all-courses"
     target="_self">Browse All Courses</a>
</div>

<div id="pa-congrats-divider"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
function fireConfetti() {
  var colors = ['#F6B000', '#F4C540', '#447099', '#D1DBE5', '#ffffff'];
  var count  = 180;

  function fire(ratio, opts) {
    confetti(Object.assign({
      particleCount: Math.floor(count * ratio),
      colors: colors,
      origin: { y: 0.55 }
    }, opts));
  }

  fire(0.25, { spread: 26,  startVelocity: 55 });
  fire(0.20, { spread: 60 });
  fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
  fire(0.10, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
  fire(0.10, { spread: 120, startVelocity: 45 });
}

function initConfetti() {
  fireConfetti();
  var btn = document.getElementById('pa-confetti-btn');
  if (btn) btn.addEventListener('click', fireConfetti);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initConfetti);
} else {
  initConfetti();
}
</script>

<!-- END Posit Academy Post-Course Congratulations -->

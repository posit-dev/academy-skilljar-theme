<script>
(function () {
  /* Shared state — must live outside init() so duplicate calls don't reset it */
  var collapseAt    = null;
  var collapseReady = false;

  function checkNavOverflow() {
    /* Below SkillJar's own mobile breakpoint — let it handle collapse */
    if (window.innerWidth <= 875) return;

    var header   = document.getElementById('header');
    var logoLink = document.querySelector('#header-left .header-logo-link');
    var firstNav = document.querySelector('#header-right .header-links-container .header-link--base');
    if (!header || !logoLink || !firstNav) return;

    var collapsed = header.classList.contains('pa-collapse-nav');

    if (!collapsed) {
      var logoRight = logoLink.getBoundingClientRect().right;
      var navLeft   = firstNav.getBoundingClientRect().left;
      /* Guard: skip if layout hasn't happened yet */
      if (logoRight > 0 && navLeft > 0 && logoRight >= navLeft - 8) {
        collapseAt = window.innerWidth;
        header.classList.add('pa-collapse-nav');
      }
    } else {
      if (collapseAt !== null && window.innerWidth > collapseAt + 20) {
        header.classList.remove('pa-collapse-nav');
        collapseAt = null;
      }
    }
  }

  function init() {
    var header      = document.getElementById('header');
    var headerLeft  = document.getElementById('header-left');
    var headerRight = document.getElementById('header-right');
    var pad = 'max(20px, calc((100vw - 1280px) / 4))'; /* fixed gutter — adjust in CSS too if changing */

    /* Zero out SkillJar's own header padding, then inset children */
    if (header) {
      header.style.setProperty('padding-left',  '0px', 'important');
      header.style.setProperty('padding-right', '0px', 'important');
    }
    if (headerLeft)  { headerLeft.style.setProperty('margin-left',   pad, 'important'); }
    if (headerRight) { headerRight.style.setProperty('margin-right', pad, 'important'); }

    /* Set up nav-collapse listener only once */
    if (!collapseReady) {
      collapseReady = true;
      window.addEventListener('resize', checkNavOverflow);
      /* Delay first check so SkillJar's own JS has time to finish layout */
      setTimeout(checkNavOverflow, 300);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  window.addEventListener('load', init);
}());
</script>

<!-- START Course Separators -->
<!--
  HOW TO USE:
  1. Create a course in SkillJar with [separator] anywhere in the title
     e.g. "[separator] Getting Started"
  2. Add the tag "separator" to that course
  3. The [separator] text will be stripped from the visible title
  4. The tile will render as a full-width section header instead of a course card
-->
<script>
var textAlignment = 'left'; /* change to 'center' for centered section headers */

function runSeparatorSetup() {
    // Strip [separator] text and set alignment
    var courseboxContainers = document.querySelectorAll('.coursebox-container');
    courseboxContainers.forEach(function(container) {
        var courseboxText = container.querySelector('.coursebox-text');
        var lowercaseText = courseboxText.textContent.toLowerCase();
        if (lowercaseText.indexOf('[separator]') !== -1) {
            courseboxText.textContent = courseboxText.textContent.replace('[separator]', '');
            courseboxText.textContent = courseboxText.textContent.replace('[Separator]', '');
            container.style.textAlign = textAlignment;
        }
    });

    // Inject "Explore" button into separators that opt in with [explore-btn] in their description.
    // To enable: add [explore-btn] anywhere in the separator's description field in SkillJar.
    // The marker is stripped before rendering. Link destination is the separator's own href.
    document.querySelectorAll('a.coursebox-container[data-tags="separator"]').forEach(function(sep) {
        var dest = 'https://academy.posit.co/page/all-courses';
        var desc = sep.querySelector('.coursebox-text-description');
        if (!desc) return;
        if (desc.textContent.indexOf('[explore-btn]') === -1) return; // opt-in marker required
        desc.innerHTML = desc.innerHTML.replace(/\[explore-btn\]/gi, '');
        // Point the separator card's own href to the destination so the <a> handles navigation
        sep.setAttribute('href', dest);
        var btn = document.createElement('span');
        btn.className = 'pa-sep-btn';
        btn.textContent = 'Explore all courses';
        desc.appendChild(btn);
    });

    // Align separator left edge with the first course tile
    var firstTile = document.querySelector('#catalog-courses a.coursebox-container:not([data-tags="separator"])');
    var separators = document.querySelectorAll('a.coursebox-container[data-tags="separator"]');
    if (firstTile && separators.length) {
        var tileLeft = firstTile.getBoundingClientRect().left;
        separators.forEach(function(sep) {
            var sepLeft = sep.getBoundingClientRect().left;
            sep.style.paddingLeft = Math.max(0, tileLeft - sepLeft) + 'px';
        });
    }

    // Reveal all separator cards now that processing is complete.
    // CSS keeps them invisible until this attribute is set, preventing
    // the [separator] text from flashing briefly on page load.
    document.querySelectorAll('a.coursebox-container[data-tags="separator"]').forEach(function(sep) {
        sep.setAttribute('data-pa-ready', '');
    });

}

/* Poll until SkillJar's course cards are in the DOM, then run.
   Handles both the direct-paste path and the async GitHub fetch path. */
var sepPoll = setInterval(function() {
    if (document.querySelector('a.coursebox-container[data-tags="separator"]')) {
        clearInterval(sepPoll);
        runSeparatorSetup();
    }
}, 200);
setTimeout(function() { clearInterval(sepPoll); }, 15000);
</script>

<script>
/* ── Role card path links ──────────────────────────────────────────────────
   Role cards are SkillJar course <a> elements whose href points to the
   course detail page. This overrides that href with the correct path URL.

   TO ADD A NEW ROLE:
   Add a new entry to rolePathMap below using the card's title (lowercase,
   trimmed) as the key and the full path URL as the value.
   ─────────────────────────────────────────────────────────────────────── */
(function () {
  var rolePathMap = {
    'data scientist': 'https://academy.posit.co/path/data-scientist',
    'it admin':       'https://academy.posit.co/path/it-admin'
    /* Add more roles here as paths are created, e.g.:
    'data engineer':  'https://academy.posit.co/path/data-engineer',
    'data manager':   'https://academy.posit.co/path/data-manager'  */
  };

  function updateRoleCardLinks() {
    document.querySelectorAll('a.coursebox-container[data-tags~="role-card"]').forEach(function (card) {
      var titleEl = card.querySelector('.coursebox-text');
      if (!titleEl) return;
      var key = titleEl.textContent.trim().toLowerCase();
      /* Stamp a slug attribute so per-role CSS overrides can target individual cards */
      card.setAttribute('data-pa-role', key.replace(/\s+/g, '-'));
      if (rolePathMap[key]) {
        card.href = rolePathMap[key];
      }
    });
  }

  /* Poll until SkillJar has rendered the course cards */
  var poll = setInterval(function () {
    if (document.querySelector('a.coursebox-container[data-tags~="role-card"]')) {
      clearInterval(poll);
      updateRoleCardLinks();
    }
  }, 200);
  setTimeout(function () { clearInterval(poll); }, 15000);
}());
</script>

<script>
(function () {
  function injectCatalogButton() {
    if (!document.body.classList.contains('sj-page-detail-course')) return;
    if (document.querySelector('a.pa-catalog-btn')) return;

    var purchaseBtn = document.querySelector('a#purchase-button, a.purchase-button');
    if (!purchaseBtn) return;

    /* Insert catalog button as a direct sibling after the register button.
       Foundation's "medium button" classes ensure identical base sizing. */
    var catalogBtn = document.createElement('a');
    catalogBtn.className = 'medium button pa-catalog-btn';
    catalogBtn.href = '/';
    catalogBtn.textContent = 'Return to Catalog';
    purchaseBtn.insertAdjacentElement('afterend', catalogBtn);
  }

  function fixSaveToggle() {
    if (!document.body.classList.contains('sj-page-detail-course')) return;

    var row = document.querySelector('.sj-save-toggle-row-alignment');
    if (!row) return;

    /* sjwc-context-provider uses a shadow root that we can't style from
       outside — it positions the bookmark via internal shadow DOM styles.
       Extract sjwc-save-content-toggle and place it directly in the flex
       row so gap:12px handles its spacing like the other two buttons. */
    var saveToggle = row.querySelector('sjwc-save-content-toggle');
    if (!saveToggle || saveToggle.dataset.moved) return;
    saveToggle.dataset.moved = '1';
    row.appendChild(saveToggle);
  }

  /* ── Align lower-section padding with the hero image edges ──
     Same approach as the live-training page: measure .dp-promo-image and
     .dp-promo-image-wrapper to derive symmetric left inset, then match the
     right edge to the image panel. Skipped on live-training pages — those
     have their own (identical) sync in the live-training script block. */
  function syncLowerSectionPadding() {
    if (!document.body.classList.contains('sj-page-detail-course')) return;
    if (document.querySelector('#main-container[data-tags~="live-training"]')) return;

    var img    = document.querySelector('.dp-promo-image');
    var detRow = document.querySelector('#dp-details .row.hide-for-small');
    if (!img || !detRow) return;

    var imgRect = img.getBoundingClientRect();
    var rowRect = detRow.getBoundingClientRect();

    /* Right: about-column right edge = image panel right edge */
    var padRight = Math.max(0, Math.round(rowRect.right - imgRect.right));

    /* Left: strip the SkillJar-specific image inset so only the symmetric
       container offset remains — this is where h1 (and h3) start. */
    var imgWrapper = document.querySelector('.dp-promo-image-wrapper');
    var padLeft;
    if (imgWrapper) {
      var imageInset = Math.max(0, Math.round(imgWrapper.getBoundingClientRect().right - imgRect.right));
      padLeft = Math.max(0, padRight - imageInset);
    } else {
      padLeft = padRight;
    }

    detRow.style.setProperty('padding-left',  padLeft  + 'px', 'important');
    detRow.style.setProperty('padding-right', padRight + 'px', 'important');
  }

  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(syncLowerSectionPadding, 60);
  });
  window.addEventListener('load', syncLowerSectionPadding);
  setTimeout(syncLowerSectionPadding, 300);

  /* SkillJar renders the purchase button asynchronously — poll until present */
  var attempts = 0;
  var poll = setInterval(function () {
    attempts++;
    if (document.querySelector('a#purchase-button, a.purchase-button')) {
      clearInterval(poll);
      injectCatalogButton();
      fixSaveToggle();
    }
    if (attempts >= 50) clearInterval(poll); /* bail after 10s */
  }, 200);
}());
</script>

    );

  function syncLowerSectionPadding() {

      tabsEl.style.setProperty('padding-left',  '20px', 'important');
      tabsEl.style.setProperty('padding-right', '20px', 'important');
      return;
    }

    var imgRect  = img.getBoundingClientRect();
    var tabsRect = tabsEl.getBoundingClientRect();

    /* Right: tabs-container right edge → image panel right edge */
    var padRight = Math.max(0, Math.round(tabsRect.right - imgRect.right));

    /* Left: subtract the image wrapper's internal inset so the left edge
       aligns with where h1 text starts (not the outer wrapper edge). */
    var imgWrapper = document.querySelector('.cp-promo-image-wrapper');
    var padLeft;

      padLeft = Math.max(0, padRight - imageInset);
    } else {
      padLeft = padRight;
    }

    tabsEl.style.setProperty('padding-left',  padLeft  + 'px', 'important');
    tabsEl.style.setProperty('padding-right', padRight + 'px', 'important');
  }

<script>
(function () {
  /* Only run on live training course pages */
  var container = document.getElementById('main-container');
  if (!container) return;
  var tags = (container.getAttribute('data-tags') || '').split(/\s+/);
  if (tags.indexOf('live-training') === -1) return;

  function injectCatalogButton() {
    if (document.querySelector('a.pa-catalog-btn')) return;
    var purchaseBtn = document.querySelector('a#purchase-button, a.purchase-button');
    if (!purchaseBtn) return;
    var catalogBtn = document.createElement('a');
    catalogBtn.className = 'medium button pa-catalog-btn';
    catalogBtn.href = '/';
    catalogBtn.textContent = 'Return to Catalog';
    purchaseBtn.insertAdjacentElement('afterend', catalogBtn);
  }

  function fixSaveToggle() {
    var row = document.querySelector('.sj-save-toggle-row-alignment');
    if (!row) return;
    var saveToggle = row.querySelector('sjwc-save-content-toggle');
    if (!saveToggle || saveToggle.dataset.moved) return;
    saveToggle.dataset.moved = '1';
    row.appendChild(saveToggle);
  }

  /* ── Align lower section padding with the hero image edges ──
     CSS can't reliably replicate SkillJar's internal padding-side
     formula, so we measure the rendered image panel position directly
     and apply matching padding to #dp-details .row. */
  function syncLowerSectionPadding() {
    var img    = document.querySelector('.dp-promo-image');
    var detRow = document.querySelector('#dp-details .row.hide-for-small');
    if (!img || !detRow) return;

    var imgRect = img.getBoundingClientRect();
    var rowRect = detRow.getBoundingClientRect();

    /* Right: sessions panel right edge = image panel right edge */
    var padRight = Math.max(0, Math.round(rowRect.right - imgRect.right));

    /* Left: the hero flex row is symmetric (equal left/right padding on
       .dp-row-flex-v2, outer container is centered with margin:auto).
       padRight = symmetricInset + imageInset  (where imageInset = space
       between .dp-promo-image panel and its wrapper — SkillJar margin/gap).
       padLeft  = symmetricInset only  →  padLeft = padRight − imageInset. */
    var imgWrapper = document.querySelector('.dp-promo-image-wrapper');
    var padLeft;
    if (imgWrapper) {
      var imageInset = Math.max(0, Math.round(imgWrapper.getBoundingClientRect().right - imgRect.right));
      padLeft = Math.max(0, padRight - imageInset);
    } else {
      padLeft = padRight;
    }

    detRow.style.setProperty('padding-left',  padLeft  + 'px', 'important');
    detRow.style.setProperty('padding-right', padRight + 'px', 'important');
  }

  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(syncLowerSectionPadding, 60);
  });
  window.addEventListener('load', syncLowerSectionPadding);
  /* Also run after a short delay so SkillJar's own JS has finished layout */
  setTimeout(syncLowerSectionPadding, 300);

  var attempts = 0;
  var poll = setInterval(function () {
    attempts++;
    if (document.querySelector('a#purchase-button, a.purchase-button')) {
      clearInterval(poll);
      injectCatalogButton();
      fixSaveToggle();
    }
    if (attempts >= 50) clearInterval(poll);
  }, 200);
}());
</script>

<script>
(function () {
  var timelineRan = false;

  /* ── Inject "Return to Catalog" button on path pages ──
     Mirrors the course page pattern in the course landing page block above. */
  function injectPathCatalogButton() {
    if (!document.body.classList.contains('sj-page-detail-path') &&
        !document.body.classList.contains('sj-page-path')) return;
    if (document.querySelector('a.pa-catalog-btn')) return;

    var purchaseBtn = document.querySelector('a#purchase-button, a.purchase-button');
    if (!purchaseBtn) return;

    var btn = document.createElement('a');
    btn.className = 'medium button pa-catalog-btn';
    btn.href = '/';
    btn.textContent = 'Return to Catalog';
    purchaseBtn.insertAdjacentElement('afterend', btn);
  }

  /* ── Move save toggle out of shadow DOM on path pages ── */
  function fixPathSaveToggle() {
    if (!document.body.classList.contains('sj-page-detail-path') &&
        !document.body.classList.contains('sj-page-path')) return;

    var row = document.querySelector('.sj-save-toggle-row-alignment');
    if (!row) return;

    var saveToggle = row.querySelector('sjwc-save-content-toggle');
    if (!saveToggle || saveToggle.dataset.moved) return;
    saveToggle.dataset.moved = '1';
    row.appendChild(saveToggle);
  }

  /* Poll for the purchase button (rendered async by SkillJar) */
  var pathAttempts = 0;
  var pathPoll = setInterval(function () {
    pathAttempts++;
    if (document.querySelector('a#purchase-button, a.purchase-button')) {
      clearInterval(pathPoll);
      injectPathCatalogButton();
      fixPathSaveToggle();
    }
    if (pathAttempts >= 50) clearInterval(pathPoll); /* bail after ~10 s */
  }, 200);

  /* ── Inject path-desc and separator UI cards from per-path config ──
     Called once real course cards are in the DOM. Reads window.paPathConfig
     (set by the per-path HTML block, e.g. data-scientist-path.html) for the
     description title and HTML content. After injection, runs timeline setup.
     These are plain <div> elements — not SkillJar courses — so they never
     appear in SkillJar's path curriculum or affect completion tracking. */
  function runPathInjection() {
    if (!document.body.classList.contains('sj-page-detail-path') &&
        !document.body.classList.contains('sj-page-path') &&
        !document.body.classList.contains('sj-page-detail-bundle')) return;

    var courses = document.getElementById('catalog-courses');
    if (!courses) return;

    /* Avoid double-injection on re-runs */
    if (courses.querySelector('.pa-path-ui-card')) return;

    /* 1. path-desc card — content from window.paPathConfig set in per-path HTML */
    var cfg = window.paPathConfig;
    if (cfg && cfg.pathDesc) {
      var descCard = document.createElement('div');
      descCard.className = 'pa-path-ui-card';
      descCard.setAttribute('data-tags', 'path-desc');
      descCard.setAttribute('data-pa-ready', '');
      var titleDiv = document.createElement('div');
      titleDiv.className = 'coursebox-text';
      titleDiv.textContent = cfg.pathDesc.title || 'Build real skills for your role';
      var descDiv = document.createElement('div');
      descDiv.className = 'coursebox-text-description';
      descDiv.innerHTML = cfg.pathDesc.html || '';
      descCard.appendChild(titleDiv);
      descCard.appendChild(descDiv);
      courses.appendChild(descCard);
    }

    /* 2. Separator card — renders "Learning Path" heading in the left column */
    var sepCard = document.createElement('div');
    sepCard.className = 'pa-path-ui-card';
    sepCard.setAttribute('data-tags', 'separator');
    sepCard.setAttribute('data-pa-ready', '');
    var sepTitle = document.createElement('div');
    sepTitle.className = 'coursebox-text';
    sepTitle.textContent = 'Learning Path';
    sepCard.appendChild(sepTitle);
    courses.appendChild(sepCard);

    /* 3. Grid-row assignments for course cards + separator */
    setTimeout(runPathTimelineSetup, 50);
  }

  /* ── Inject timeline status divs (Asana-style siblings, not card children) ──
     Each .pa-timeline-status sits in col 2 of the 3-column grid, in the same
     row as its course card. Explicit grid-row on both ensures alignment.
     CSS ::before draws the line (extending ±row-gap to bridge gaps);
     CSS ::after draws the circle. No pixel measurements, no resize handler. */
  function runPathTimelineSetup() {
    if (timelineRan) return;
    if (!document.body.classList.contains('sj-page-detail-path') &&
        !document.body.classList.contains('sj-page-path') &&
        !document.body.classList.contains('sj-page-detail-bundle')) return;
    timelineRan = true;

    var courses = document.getElementById('catalog-courses');
    if (!courses) return;

    courses.querySelectorAll('.pa-timeline-line, .pa-timeline-status').forEach(function (el) { el.remove(); });

    var cards = Array.from(courses.querySelectorAll(
      'a.coursebox-container:not([data-tags~="separator"]):not([data-tags~="path-desc"])'
    ));
    if (!cards.length) return;

    /* Clamp the separator's span to the actual card count so no empty rows
       are created (row-gap on 50 empty rows = ~900px of whitespace) */
    var separator = courses.querySelector('.pa-path-ui-card[data-tags="separator"]');
    if (separator) {
      separator.style.setProperty('grid-row', '2 / span ' + cards.length); /* no !important */
    }

    cards.forEach(function (card, i) {
      /* row 1 = path-desc (or empty); course cards start at row 2 */
      var row = String(i + 2);
      card.style.setProperty('grid-row', row); /* no !important — lets mobile CSS reset to auto */

      var status = document.createElement('div');
      status.className = 'pa-timeline-status' +
        (i === 0                ? ' pa-timeline-status--first' : '') +
        (i === cards.length - 1 ? ' pa-timeline-status--last'  : '');
      status.style.gridRow = row;
      courses.appendChild(status);
    });
  }

  /* Poll until #catalog-courses is in the DOM, then inject the separator
     and path-desc UI elements and run the timeline. Fires even when the path
     has no courses yet (e.g. a newly created path) — runPathTimelineSetup
     returns early when there are no real cards, so that case is safe. */
  var pathSetupPoll = setInterval(function () {
    if (!document.body.classList.contains('sj-page-detail-path') &&
        !document.body.classList.contains('sj-page-path') &&
        !document.body.classList.contains('sj-page-detail-bundle')) {
      clearInterval(pathSetupPoll);
      return;
    }
    if (document.getElementById('catalog-courses')) {
      clearInterval(pathSetupPoll);
      runPathInjection();
    }
  }, 200);
  setTimeout(function () { clearInterval(pathSetupPoll); }, 15000);
}());
</script>

<!-- ══════════════════════════════════════════════
     PATH PAGE — COURSE LIST LAYOUT
     Two-column design: "Learning Path" separator occupies the left
     column alongside a vertical timeline; course cards stack in the
     right column as full-width horizontal items (image left, text right).

     HOW TO USE:
     The separator and path-desc cards are injected as plain <div> elements
     by runPathInjection() — do NOT add dummy SkillJar courses for them.
     Add path-specific content via window.paPathConfig in the per-path HTML
     block (e.g. data-scientist-path.html). Real courses go straight into
     the SkillJar path; all non-.pa-path-ui-card cards go to the right column.
     ══════════════════════════════════════════════ -->
<style>

/* ── 3-column grid: [separator 240px] [timeline 40px] [cards 1fr] ──
   The 40px timeline column sits where the old 60px column-gap was.
   No column-gap needed — the columns provide the spacing.
   row-gap stays at 20px; status div lines bridge it via top/bottom extension. */
body:is(.sj-page-detail-path, .sj-page-path) #catalog-courses {
  display: grid !important;
  grid-template-columns: 240px 40px 1fr !important;
  column-gap: 0 !important;
  row-gap: 20px !important;
  padding-top: 40px !important;
  padding-bottom: 60px !important;
  padding-left: max(20px, 5vw) !important;
  padding-right: max(20px, 5vw) !important;
  align-items: start !important;
  justify-content: unset !important;
  position: relative !important;
}

/* ── path-desc card: row 1, full width — sits above the separator/course grid ──
   High-specificity selector beats SkillJar's #catalog-courses flex/max-width rules */
body:is(.sj-page-detail-path, .sj-page-path) #catalog-courses .pa-path-ui-card[data-tags~="path-desc"] {
  display: grid !important;
  grid-template-columns: 35% 1fr !important;
  column-gap: 60px !important;
  align-items: start !important;
  grid-row: 1 !important;
  grid-column: 1 / -1 !important;
  width: 100% !important;
  max-width: 100% !important;
  box-sizing: border-box !important;
  padding: 40px 0 48px !important;
  border-bottom: 1px solid #E8ECEF !important;
}

/* ── Separator: left column, starts at row 2 so path-desc occupies row 1 ── */
body:is(.sj-page-detail-path, .sj-page-path) .pa-path-ui-card[data-tags="separator"] {
  grid-column: 1 !important;
  grid-row: 2 / span 50; /* fallback; JS overrides via inline style to exact card count */
  align-self: start !important;
  padding: 20px 0 0 !important;
  max-width: unset !important;
  width: auto !important;
}
/* Title text — scoped here because global separator CSS only targets a.coursebox-container */
body:is(.sj-page-detail-path, .sj-page-path) .pa-path-ui-card[data-tags="separator"] .coursebox-text {
  font-family: 'Open Sans', sans-serif !important;
  font-size: clamp(22px, 2.5vw, 34px) !important;
  font-weight: 700 !important;
  color: #17212B !important;
  line-height: 1.2 !important;
  padding: 0 !important;
  margin: 0 0 12px !important;
  display: block !important;
}
body:is(.sj-page-detail-path, .sj-page-path) .pa-path-ui-card[data-tags="separator"] .coursebox-text::after {
  content: '' !important;
  display: block !important;
  width: 80px !important;
  height: 3px !important;
  background-color: #447099 !important;
  margin-top: 10px !important;
}


/* ── Course cards: col 3 (right), grid layout (image left | title/desc/tags right) ── */
body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container:not([data-tags="separator"]):not([data-tags~="path-desc"]) {
  grid-column: 3 !important;
  display: grid !important;
  grid-template-columns: 220px 1fr !important;
  align-items: unset !important;
  width: 100% !important;
  max-width: 100% !important;
  flex: unset !important;
  min-height: 140px !important;
  border-radius: 12px !important;
  overflow: hidden !important;
}

/* ── Timeline status div: col 2 (the 40px gutter column) ──
   JS injects one per course card with a matching grid-row. align-self: stretch
   makes it exactly as tall as its card row. The ::before line extends top/bottom
   by the row-gap (20px) to bridge gaps — safe because we own these divs so
   nothing applies overflow:hidden to them. */
body:is(.sj-page-detail-path, .sj-page-path) .pa-timeline-status {
  grid-column: 2 !important;
  align-self: stretch !important;
  position: relative !important;
}
/* Line: default (middle cards) bridges both the gap above and below */
body:is(.sj-page-detail-path, .sj-page-path) .pa-timeline-status::before {
  content: '' !important;
  position: absolute !important;
  left: 50% !important;
  width: 1px !important;
  background: #A2B8CB !important;
  top: -20px !important;   /* extends up through the row-gap above */
  bottom: -20px !important; /* extends down through the row-gap below */
  z-index: 0 !important;
}
/* First card: line starts at circle centre — nothing above */
body:is(.sj-page-detail-path, .sj-page-path) .pa-timeline-status--first::before {
  top: 50% !important;
}
/* Last card: line ends at circle centre — nothing below */
body:is(.sj-page-detail-path, .sj-page-path) .pa-timeline-status--last::before {
  bottom: 50% !important;
}
/* Circle: centred in the status div, sits above the line */
body:is(.sj-page-detail-path, .sj-page-path) .pa-timeline-status::after {
  content: '' !important;
  position: absolute !important;
  left: 50% !important;
  top: 50% !important;
  transform: translate(-50%, -50%) !important;
  width: 14px !important;
  height: 14px !important;
  border-radius: 50% !important;
  border: 2px solid #A2B8CB !important;
  background-color: #ffffff !important;
  box-shadow: 0 0 0 4px #ffffff !important;
  z-index: 2 !important;
  pointer-events: none !important;
}

/* ── Course image: left column, spans all rows ── */
body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container:not([data-tags="separator"]) .coursebox-image {
  grid-column: 1 !important;
  grid-row: 1 / span 10 !important;
  width: auto !important;
  min-height: 140px !important;
  height: auto !important;
  align-self: stretch !important;
  padding: 0 !important;
  margin: 0 !important;
  line-height: 0 !important;
  border-radius: 0 !important; /* card overflow:hidden + border-radius:12px handles corners */
  overflow: hidden !important;
  background-color: #D1DBE5 !important;
}
body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container:not([data-tags="separator"]) .coursebox-image img {
  width: 100% !important;
  height: 100% !important;
  max-width: unset !important;
  object-fit: cover !important;
  object-position: center !important;
  display: block !important;
}
/* Live training image panel: yellow tint (overrides the light-blue default above) */
body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container[data-tags~="live-training"] .coursebox-image {
  background-color: #F4C540 !important;
}

/* ── Course text: title, description, tags — stacked in right column ── */
body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container:not([data-tags="separator"]) .coursebox-text {
  grid-column: 2 !important;
  grid-row: 1 !important;
  font-size: 20px !important;
  font-weight: 700 !important;
  padding: 20px 24px 6px !important;
  line-height: 1.3 !important;
  width: auto !important;
  flex: none !important;
}
body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container:not([data-tags="separator"]) .coursebox-text-description {
  grid-column: 2 !important;
  grid-row: 2 !important;
  font-size: 14px !important;
  padding: 0 24px 10px !important;
  line-height: 1.65 !important;
  flex: unset !important;
}
body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container:not([data-tags="separator"]) .coursebox-tags {
  grid-column: 2 !important;
  grid-row: 3 !important;
  padding: 0 24px 20px !important;
  display: flex !important;
  align-items: center !important;
  gap: 6px !important;
}
body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container:not([data-tags="separator"]) .clearfix {
  display: none !important;
}

/* ── Mobile: single-column stacked cards ── */
@media only screen and (max-width: 768px) {
  body:is(.sj-page-detail-path, .sj-page-path) #catalog-courses {
    grid-template-columns: 1fr !important;
    column-gap: 0 !important;
    row-gap: 16px !important;
  }
  /* path-desc and separator are appended last in the DOM by JS, so on mobile
     (where grid-row:auto uses DOM order) they'd fall after course cards.

  body:is(.sj-page-detail-path, .sj-page-path) #catalog-courses .pa-path-ui-card[data-tags~="path-desc"] {
    order: -2 !important;
  }
  body:is(.sj-page-detail-path, .sj-page-path) .pa-path-ui-card[data-tags="separator"] {
    order: -1 !important;
    grid-column: 1 !important;
    grid-row: auto !important;

  }
  body:is(.sj-page-detail-path, .sj-page-path) .pa-path-ui-card[data-tags="separator"]::after {
    display: none !important;
  }
  body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container:not([data-tags="separator"]):not([data-tags~="path-desc"]) {
    grid-column: 1 !important;
    grid-row: auto !important; /* overrides the non-important inline style set by JS */
  }
  body:is(.sj-page-detail-path, .sj-page-path) .pa-timeline-status {
    display: none !important;
  }
  /* path-desc: stack title above description on mobile */
  body:is(.sj-page-detail-path, .sj-page-path) #catalog-courses .pa-path-ui-card[data-tags~="path-desc"] {
    display: flex !important;
    flex-direction: column !important;

  }
  body:is(.sj-page-detail-path, .sj-page-path) #catalog-courses .pa-path-ui-card[data-tags~="path-desc"] .coursebox-text {

    padding-bottom: 14px !important;
  }
  body:is(.sj-page-detail-path, .sj-page-path) #catalog-courses .pa-path-ui-card[data-tags~="path-desc"] .coursebox-text-description {

  }
  body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container:not([data-tags="separator"]):not([data-tags~="path-desc"]) {
    grid-template-columns: 1fr !important; /* matches desktop selector specificity so source order wins */
  }
  body:is(.sj-page-detail-path, .sj-page-path) a.coursebox-container:not([data-tags="separator"]) .coursebox-image {

/* ── path-desc card: undo bleed-in from the course card child-element rules above ──

   Adding #catalog-courses (ID) gives us higher specificity to override them. */
body:is(.sj-page-detail-path, .sj-page-path) #catalog-courses .pa-path-ui-card[data-tags~="path-desc"] .coursebox-image {
  display: none !important;
}
body:is(.sj-page-detail-path, .sj-page-path) #catalog-courses .pa-path-ui-card[data-tags~="path-desc"] .coursebox-text {

  grid-row: 1 !important;

}
body:is(.sj-page-detail-path, .sj-page-path) #catalog-courses .pa-path-ui-card[data-tags~="path-desc"] .coursebox-text-description {
  grid-column: 2 !important;
  grid-row: 1 !important;

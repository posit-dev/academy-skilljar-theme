<script>
/* Inject the native-hero hide rule into <head> synchronously so it applies
   before the browser paints, preventing the white-gap FOUC on the
   unregistered path page. The <style> block later in this file is a
   fallback for any edge-case where this script is deferred. */
(function(){
  var b = document.body;
  if (!b || (!b.classList.contains('sj-page-detail-path') && !b.classList.contains('sj-page-detail-bundle'))) return;
  var s = document.createElement('style');
  s.textContent = '.top-row-grey,.top-row-white-v2{display:none!important}';
  document.head.appendChild(s);
}());
</script>

<script>
/* Zero out top margin/padding on every ancestor element between #pa-path-hero
   and SkillJar's outer containers — mirrors the fixCatalogGap pattern in
   home-page.html so the hero image reaches the full viewport width. */
(function () {
  function fixPathGap() {
    var hero = document.getElementById('pa-path-hero');
    if (!hero) return;
    var el = hero.parentElement;
    /* Walk all the way up to (but not including) the body, zeroing every
       ancestor's own margin/padding/max-width. Stopping early at .top-row or
       .catalog-center-width left those elements' own padding uncleaned. */
    while (el && el !== document.body && el !== document.documentElement) {
      el.style.setProperty('margin-top',  '0',       'important');
      el.style.setProperty('padding-top', '0',       'important');
      el.style.setProperty('overflow',    'visible', 'important');
      /* Leave #catalog-content's max-width and side margins alone — the global
         CSS sets max-width: 1280px + margin: auto there for consistent centering
         on both the enrolled and unenrolled pages. Zeroing it here would override
         that rule via inline style and break the enrolled-page layout. */
      if (el.id !== 'catalog-content') {
        el.style.setProperty('max-width', 'none', 'important');
      }
      if (el.id !== 'catalog-courses' && el.id !== 'catalog-content') {
        el.style.setProperty('margin-left',   '0', 'important');
        el.style.setProperty('padding-left',  '0', 'important');
        el.style.setProperty('margin-right',  '0', 'important');
        el.style.setProperty('padding-right', '0', 'important');
      }
      el = el.parentElement;
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fixPathGap);
  } else {
    fixPathGap();
  }
  window.addEventListener('load', fixPathGap);
}());

/* Sync hero CTA href + update text based on enrollment state.
   - Not enrolled (sj-page-detail-path): href from SkillJar's purchase button, text "Get Started"
   - Enrolled (sj-page-path): href from SkillJar's resume button, text "Resume" */
(function () {
  var enrolled = document.body.classList.contains('sj-page-path');
  var cta = document.getElementById('pa-path-hero-cta');

  /* Update button text immediately on enrolled page — no polling needed */
  if (enrolled && cta) cta.textContent = 'Resume';

  var attempts = 0;
  var poll = setInterval(function () {
    attempts++;
    /* On enrolled page, SkillJar injects #path-curriculum-resume-button (inside the
       hidden .path-curriculum-resume-wrapper). On un-enrolled, use the purchase button. */
    var sjBtn = enrolled
      ? document.querySelector('a#path-curriculum-resume-button')
      : document.querySelector('a#purchase-button, a.purchase-button');
    if (sjBtn && sjBtn.href && sjBtn.href !== window.location.href + '#') {
      if (cta) cta.href = sjBtn.href;
      clearInterval(poll);
    }
    if (attempts >= 50) clearInterval(poll); /* bail after ~10 s */
  }, 200);
}());
</script>

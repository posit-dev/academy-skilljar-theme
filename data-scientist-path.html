<script>
/* Zero out top margin/padding on every ancestor element between #pa-path-hero
   and SkillJar's outer containers — mirrors the fixCatalogGap pattern in
   home-page.html so the hero image reaches the full viewport width. */
(function () {
  function fixPathGap() {
    var hero = document.getElementById('pa-path-hero');
    if (!hero) return;
    var el = hero.parentElement;
    /* Walk all the way up to (but not including) the body, zeroing every
       ancestor's own margin/padding/max-width. Stopping early at .top-row or
       .catalog-center-width left those elements' own padding uncleaned. */
    while (el && el !== document.body && el !== document.documentElement) {
      el.style.setProperty('margin-top',    '0', 'important');
      el.style.setProperty('padding-top',   '0', 'important');
      el.style.setProperty('margin-left',   '0', 'important');
      el.style.setProperty('padding-left',  '0', 'important');
      el.style.setProperty('margin-right',  '0', 'important');
      el.style.setProperty('padding-right', '0', 'important');
      el.style.setProperty('max-width', 'none', 'important');
      el = el.parentElement;
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fixPathGap);
  } else {
    fixPathGap();
  }
  window.addEventListener('load', fixPathGap);
}());

/* Sync "Get Started" href to SkillJar's native path CTA.
   SkillJar renders its button asynchronously, so poll until it appears. */
(function () {
  var attempts = 0;
  var poll = setInterval(function () {
    attempts++;
    var sjBtn = document.querySelector('a#purchase-button, a.purchase-button');
    if (sjBtn && sjBtn.href && sjBtn.href !== window.location.href + '#') {
      var cta = document.getElementById('pa-path-hero-cta');
      if (cta) cta.href = sjBtn.href;
      clearInterval(poll);
    }
    if (attempts >= 50) clearInterval(poll); /* bail after ~10 s */
  }, 200);
}());
</script>

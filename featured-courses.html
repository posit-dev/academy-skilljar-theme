<style>
/* ═══════════════════════════════════════════════
   CSS VARIABLES — Edit colors here
   ═══════════════════════════════════════════════ */
body {
  --pa-section-heading:   #404041;
  --pa-card-bg:           #ffffff;
  --pa-card-border:       #E2E8EF;
  --pa-card-title:        #404041;
  --pa-card-desc:         #666666;
  --pa-img-course-bg:     #FADAD0; /* salmon — course image placeholder */
  --pa-img-training-bg:   #D1E5E6; /* teal   — live training image placeholder */
  --pa-badge-course-bg:   #EE6331; /* orange */
  --pa-badge-training-bg: #419599; /* teal   */
}

/* ═══════════════════════════════════════════════
   STYLES
   ═══════════════════════════════════════════════ */

/* Section wrapper */
.pa-section {
  padding: 36px 0;
}
.pa-section__heading {
  font-family: 'Open Sans', sans-serif !important;
  font-size: 26px !important;
  font-weight: 700 !important;
  color: var(--pa-section-heading) !important;
  margin: 0 0 20px 0 !important;
}

/* 3-column card grid */
.pa-cards__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* Card */
.pa-card {
  background: var(--pa-card-bg);
  border: 1px solid var(--pa-card-border);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  text-decoration: none !important;
  color: inherit;
  transition: box-shadow 0.2s, transform 0.2s;
}
.pa-card:hover {
  box-shadow: 0 6px 18px rgba(68, 112, 153, 0.14);
  transform: translateY(-2px);
}

/* Card image area */
.pa-card__img {
  aspect-ratio: 16 / 9;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.pa-card__img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.pa-card__img-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  color: #aaaaaa;
}
.pa-card__img--course   { background: var(--pa-img-course-bg); }
.pa-card__img--training { background: var(--pa-img-training-bg); }

/* Card body */
.pa-card__body {
  padding: 14px 16px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.pa-card__title {
  font-family: 'Open Sans', sans-serif !important;
  font-size: 15px !important;
  font-weight: 700 !important;
  color: var(--pa-card-title) !important;
  margin: 0 0 6px 0 !important;
  line-height: 1.3 !important;
}
.pa-card__desc {
  font-family: 'Open Sans', sans-serif !important;
  font-size: 13px !important;
  color: var(--pa-card-desc) !important;
  margin: 0 !important;
  line-height: 1.5 !important;
  flex: 1;
}
.pa-card__footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 12px;
}

/* Badges */
.pa-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'Source Code Pro', 'Courier New', monospace !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: #ffffff !important;
}
.pa-badge--course   { background-color: var(--pa-badge-course-bg); }
.pa-badge--training { background-color: var(--pa-badge-training-bg); }

/* Responsive */
@media only screen and (max-width: 768px) {
  .pa-cards__grid { grid-template-columns: repeat(2, 1fr); }
}
@media only screen and (max-width: 480px) {
  .pa-cards__grid { grid-template-columns: 1fr; }
}
</style>
<!-- END Posit Academy Featured/New Courses Section -->

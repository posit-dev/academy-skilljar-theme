<style>
/*
  Posit Academy — All Courses Page
  =================================
  Paste this into the HTML editor on the All Courses catalog page.
*/

/* ── Course grid: auto-fit columns based on available width ──
   Cards are at least 200px wide; grid adds/removes columns automatically
   as the container narrows (accounts for the sidebar eating into space). */
#catalog-courses {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(max(200px, calc(33% - 11px)), 1fr)) !important;
  gap: 16px !important;
  align-items: start !important;
}

/* Separator spans full row width */
#catalog-courses a.coursebox-container[data-tags="separator"] {
  grid-column: 1 / -1 !important;
}

/* Override global-code-snippets max-width (written for home page flex layout) */
#catalog-courses a.coursebox-container:not([data-tags~="separator"]) {
  max-width: 100% !important;
  min-width: 0 !important;
  width: 100% !important;
  box-sizing: border-box !important;
  flex-grow: unset !important;
}


/* global-code-snippets sets padding: 0 max(20px,5vw) on #catalog-courses
   for the home page gutters. That rule loads after this block so CSS
   !important can't override it — we use JS inline style instead (see below). */
</style>

<script>
/* global-code-snippets adds padding: 0 max(20px,5vw) to #catalog-courses
   for home page gutters. It loads after this block so CSS !important loses.
   Inline style set via JS beats any stylesheet rule. */
(function () {
  function removeCatalogPadding() {
    var el = document.getElementById('catalog-courses');
    if (el) {
      el.style.setProperty('padding-left',  '0', 'important');
      el.style.setProperty('padding-right', '0', 'important');
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', removeCatalogPadding);
  } else {
    removeCatalogPadding();
  }
}());
</script>

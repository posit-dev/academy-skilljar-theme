<style>
/*
  Posit Academy — All Courses Page
  =================================
  Paste this into the HTML editor on the All Courses catalog page.
*/

/* ── Course grid: auto-fit columns based on available width ──
   Cards are at least 200px wide; grid adds/removes columns automatically
   as the container narrows (accounts for the sidebar eating into space).
   Padding provides gutters on left and right of the card area. */
#catalog-courses {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(max(200px, calc(33% - 11px)), 1fr)) !important;
  gap: 16px !important;
  align-items: start !important;
  padding-left: 24px !important;
  padding-right: 40px !important;
}

/* ── Remove vertical gap above catalog content ──
   SkillJar adds top padding to .sj-courseboxes-v2 and its inner wrappers.
   Zero these out so the page title aligns with the filter sidebar. */
.sj-courseboxes-v2 {
  padding-top: 0 !important;
}
#catalog-content,
.catalog-center-width {
  padding-top: 0 !important;
  margin-top: 0 !important;
}

/* Separator spans full row width; tighten spacing vs. global defaults */
#catalog-courses a.coursebox-container[data-tags="separator"] {
  grid-column: 1 / -1 !important;
  padding-top: 16px !important;
  padding-bottom: 4px !important;
}

/* Tighten description margin-bottom (global sets 24px) */
#catalog-courses a.coursebox-container[data-tags="separator"] .coursebox-text-description {
  margin-bottom: 4px !important;
}

/* Hide the "Explore all courses" button injected by global JS —
   redundant on the all-courses page itself */
.pa-sep-btn {
  display: none !important;
}

/* .skilljar-content is a flex item inside .top-row.
   - flex-shrink: 1  → SkillJar may set flex-shrink:0; override so the item CAN shrink
   - min-width: 0    → allow shrinking below content size (default is min-width:auto)
   - overflow-x: hidden → safety net in case the grid still slightly overflows */
.skilljar-content {
  flex-shrink: 1 !important;
  min-width: 0 !important;
  overflow-x: hidden !important;
}

/* Override global-code-snippets flex max-width.
   In a flex context, calc(100%/3 - 11px) resolves against viewport width, not track width,
   so each card becomes ~1/3 viewport wide and causes overflow in the sidebar layout.
   Setting max-width: none lets the grid control card sizing entirely. */
#catalog-courses a.coursebox-container:not([data-tags~="separator"]) {
  width: 100% !important;
  max-width: none !important;
  min-width: 0 !important;
  box-sizing: border-box !important;
  flex-grow: unset !important;
}


/* ── Mobile: filter drawer ──────────────────────────────────────────────
   The filter button is injected by JS directly into document.body so it
   is never inside SkillJar's content wrappers. position:fixed anchors it
   to the left edge of the viewport regardless of page layout. */

/* Filter button — JS-created, appended to <body> */
#pa-filter-btn {
  display: none;                  /* hidden by default; JS shows on narrow screens */
  position: fixed;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  z-index: 200;
  align-items: center;
  background: rgba(23, 33, 43, 0.75);
  color: #ffffff;
  border: none;
  border-radius: 0 4px 4px 0;    /* tab that "sticks out" from left edge */
  padding: 10px 10px;
  font-family: 'Open Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
}

/* Dim backdrop */
#pa-filter-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 998;
}
#pa-filter-overlay.pa-open { display: block; }

@media only screen and (max-width: 875px) {
  /* Sidebar is gone — collapse flex row to block so content fills full width */
  .storefront .top-row {
    display: block !important;
  }
  .skilljar-content {
    width: 100% !important;
    max-width: 100% !important;
  }

  /* Sidebar slides in as a drawer */
  #catalog-left-nav {
    display: block !important;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: min(82vw, 300px) !important;
    height: 100vh !important;
    overflow-y: auto !important;
    background: #ffffff !important;
    z-index: 999 !important;
    padding: 20px 16px !important;
    box-shadow: 4px 0 24px rgba(0, 0, 0, 0.18) !important;
    transform: translateX(-110%) !important;
    transition: transform 0.25s ease !important;
    box-sizing: border-box !important;
  }
  #catalog-left-nav.cbp-spmenu-open {
    transform: translateX(0) !important;
  }
}
</style>

<!-- Backdrop overlay only — button is injected by JS into document.body -->
<div id="pa-filter-overlay"></div>

<script>
(function () {
  var mq = window.matchMedia('(max-width: 875px)');

  function getOrCreateBtn() {
    var btn = document.getElementById('pa-filter-btn');
    if (btn) return btn;

    btn = document.createElement('button');
    btn.id = 'pa-filter-btn';
    btn.setAttribute('aria-label', 'Open filters');
    btn.innerHTML =
      '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" ' +
      'xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
      '<line x1="1" y1="4" x2="15" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>' +
      '<line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>' +
      '<line x1="6" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>' +
      '</svg>';

    document.body.appendChild(btn);
    return btn;
  }

  function updateVisibility() {
    var btn = getOrCreateBtn();
    btn.style.display = mq.matches ? 'inline-flex' : 'none';
  }

  function initMobileFilters() {
    var overlay = document.getElementById('pa-filter-overlay');
    if (!overlay) return;

    var btn = getOrCreateBtn();
    if (btn.dataset.wired) return;
    btn.dataset.wired = '1';

    function openFilters() {
      var nav = document.getElementById('catalog-left-nav');
      if (nav) nav.classList.add('cbp-spmenu-open');
      overlay.classList.add('pa-open');
      document.body.style.overflow = 'hidden';
    }
    function closeFilters() {
      var nav = document.getElementById('catalog-left-nav');
      if (nav) nav.classList.remove('cbp-spmenu-open');
      overlay.classList.remove('pa-open');
      document.body.style.overflow = '';
    }

    btn.addEventListener('click', openFilters);
    overlay.addEventListener('click', closeFilters);

    updateVisibility();
    mq.addEventListener('change', updateVisibility);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMobileFilters);
  } else {
    initMobileFilters();
  }
  window.addEventListener('load', initMobileFilters);
}());
</script>

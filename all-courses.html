<style>
/*
  Posit Academy — All Courses Page
  =================================
  Paste this into the HTML editor on the All Courses catalog page.
*/

/* ── Course grid: auto-fit columns based on available width ──
   Cards are at least 200px wide; grid adds/removes columns automatically
   as the container narrows (accounts for the sidebar eating into space).
   Padding provides gutters on left and right of the card area. */
#catalog-courses {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(max(200px, calc(33% - 11px)), 1fr)) !important;
  gap: 16px !important;
  align-items: start !important;
  padding-left: 24px !important;
  padding-right: 37px !important;
}

/* Separator spans full row width; tighten bottom spacing vs. global defaults */
#catalog-courses a.coursebox-container[data-tags="separator"] {
  grid-column: 1 / -1 !important;
  padding-bottom: 4px !important;
}

/* Tighten description margin-bottom (global sets 24px) */
#catalog-courses a.coursebox-container[data-tags="separator"] .coursebox-text-description {
  margin-bottom: 4px !important;
}

/* Hide the "Explore all courses" button injected by global JS —
   redundant on the all-courses page itself */
.pa-sep-btn {
  display: none !important;
}

/* .skilljar-content is a flex item inside .top-row.
   - flex-shrink: 1  → SkillJar may set flex-shrink:0; override so the item CAN shrink
   - min-width: 0    → allow shrinking below content size (default is min-width:auto)
   - overflow-x: hidden → safety net in case the grid still slightly overflows */
.skilljar-content {
  flex-shrink: 1 !important;
  min-width: 0 !important;
  overflow-x: hidden !important;
}

/* Override global-code-snippets flex max-width.
   In a flex context, calc(100%/3 - 11px) resolves against viewport width, not track width,
   so each card becomes ~1/3 viewport wide and causes overflow in the sidebar layout.
   Setting max-width: none lets the grid control card sizing entirely. */
#catalog-courses a.coursebox-container:not([data-tags~="separator"]) {
  width: 100% !important;
  max-width: none !important;
  min-width: 0 !important;
  box-sizing: border-box !important;
  flex-grow: unset !important;
}


/* ── Mobile: filter drawer ─────────────────────────────────────────────
   On narrow screens the sidebar hides. These rules turn it into a
   slide-in drawer triggered by a "Filters" button above the card grid.
   Breakpoint 900px covers phones and most tablets. */
@media only screen and (max-width: 900px) {
  /* Filters toggle button */
  #pa-filter-btn {
    display: inline-flex !important;
    align-items: center;
    gap: 8px;
    background: #17212B;
    color: #ffffff;
    border: none;
    border-radius: 4px;
    padding: 10px 20px;
    font-family: 'Open Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin: 0 0 16px 24px;
  }

  /* Dim backdrop behind the open drawer */
  #pa-filter-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    z-index: 998;
  }
  #pa-filter-overlay.pa-open { display: block; }

  /* Sidebar becomes a slide-in drawer */
  .catalog-left-nav {
    display: block !important;  /* override SkillJar's mobile display:none */
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: min(82vw, 300px) !important;
    height: 100vh !important;
    overflow-y: auto !important;
    background: #ffffff !important;
    z-index: 999 !important;
    padding: 24px 20px !important;
    box-shadow: 4px 0 24px rgba(0, 0, 0, 0.18) !important;
    transform: translateX(-110%) !important;
    transition: transform 0.25s ease !important;
    box-sizing: border-box !important;
  }
  .catalog-left-nav.pa-open {
    transform: translateX(0) !important;
  }
}

/* Hide button and overlay on wider screens */
@media only screen and (min-width: 901px) {
  #pa-filter-btn,
  #pa-filter-overlay { display: none !important; }
}
</style>

<script>
(function () {
  function initMobileFilters() {
    var grid = document.getElementById('catalog-courses');
    if (!grid) return;
    if (document.getElementById('pa-filter-btn')) return; // already run

    /* ── Filters button ── */
    var btn = document.createElement('button');
    btn.id = 'pa-filter-btn';
    btn.textContent = '\u25a4 Filters'; /* ▤ unicode filter-lines icon */
    grid.parentElement.insertBefore(btn, grid);

    /* ── Dim overlay ── */
    var overlay = document.createElement('div');
    overlay.id = 'pa-filter-overlay';
    document.body.appendChild(overlay);

    function openFilters() {
      var nav = document.querySelector('.catalog-left-nav');
      if (nav) { nav.classList.add('pa-open'); }
      overlay.classList.add('pa-open');
      document.body.style.overflow = 'hidden';
    }
    function closeFilters() {
      var nav = document.querySelector('.catalog-left-nav');
      if (nav) { nav.classList.remove('pa-open'); }
      overlay.classList.remove('pa-open');
      document.body.style.overflow = '';
    }

    btn.addEventListener('click', openFilters);
    overlay.addEventListener('click', closeFilters);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMobileFilters);
  } else {
    initMobileFilters();
  }
  window.addEventListener('load', initMobileFilters);
}());
</script>

<!-- START Posit Academy Learn By Product Section -->
<!--
  HOW TO INSTALL:
  Add a new HTML/Text Block below the Learn for Your Role section on the Catalog Page Builder.
  Open source code, delete default HTML, paste this snippet, and hit Save.

  CARDS:
  - Set href on each <a class="pa-card"> to the SkillJar learning path or filtered catalog URL
  - Replace the placeholder <div> inside pa-card__img with an <img> for a real thumbnail
  - Supported card types:
      pa-card__img--path         + pa-badge--path  → green   (Learning Path)
      pa-card__img--prefiltered                    → gray    (Prefiltered Courses, no badge)
  - To add a 4th card, duplicate a card block and add it inside pa-cards__grid
-->

<!-- ═══════════════════════════════════════════════
     CONTENT — Edit the items marked with ✏️
     ═══════════════════════════════════════════════ -->
<div class="pa-section pa-section--product">

  <h2 class="pa-section__heading">Learn By Product</h2><!-- ✏️ -->

  <div class="pa-cards__grid">

    <!-- Card 1 — Learning Path ✏️ -->
    <a href="PATH_URL_HERE" class="pa-card">
      <div class="pa-card__img pa-card__img--path">
        <!--
          ✏️ Replace placeholder div with:
             <img src="THUMBNAIL_URL" alt="Path name">
        -->
        <div class="pa-card__img-placeholder" aria-hidden="true"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
      </div>
      <div class="pa-card__body">
        <p class="pa-card__title">Learning Path Title</p><!-- ✏️ -->
        <p class="pa-card__desc">Short Description</p><!-- ✏️ -->
        <div class="pa-card__footer">
          <span class="pa-badge pa-badge--path">Path</span>
        </div>
      </div>
    </a>

    <!-- Card 2 — Learning Path ✏️ -->
    <a href="PATH_URL_HERE" class="pa-card">
      <div class="pa-card__img pa-card__img--path">
        <div class="pa-card__img-placeholder" aria-hidden="true"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
      </div>
      <div class="pa-card__body">
        <p class="pa-card__title">Learning Path Title</p><!-- ✏️ -->
        <p class="pa-card__desc">Short Description</p><!-- ✏️ -->
        <div class="pa-card__footer">
          <span class="pa-badge pa-badge--path">Path</span>
        </div>
      </div>
    </a>

    <!-- Card 3 — Prefiltered Courses (no badge) ✏️ -->
    <a href="FILTERED_CATALOG_URL_HERE" class="pa-card">
      <div class="pa-card__img pa-card__img--prefiltered">
        <div class="pa-card__img-placeholder" aria-hidden="true"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
      </div>
      <div class="pa-card__body">
        <p class="pa-card__title">Prefiltered Courses</p><!-- ✏️ -->
        <p class="pa-card__desc">Short Description</p><!-- ✏️ -->
      </div>
    </a>

  </div><!-- /.pa-cards__grid -->
</div>

<style>
/* ═══════════════════════════════════════════════
   CSS VARIABLES — Edit colors here
   ═══════════════════════════════════════════════ */
body {
  --pa-section-heading:     #404041;
  --pa-card-bg:             #ffffff;
  --pa-card-border:         #E2E8EF;
  --pa-card-title:          #404041;
  --pa-card-desc:           #666666;
  --pa-img-path-bg:         #DDE8D4; /* green — learning path image placeholder */
  --pa-img-prefiltered-bg:  #E6E6E6; /* gray  — prefiltered courses placeholder */
  --pa-badge-path-bg:       #72994E; /* green */
}

/* ═══════════════════════════════════════════════
   STYLES
   ═══════════════════════════════════════════════ */
.pa-section {
  padding: 36px 0;
}
.pa-section__heading {
  font-family: 'Open Sans', sans-serif !important;
  font-size: 26px !important;
  font-weight: 700 !important;
  color: var(--pa-section-heading) !important;
  margin: 0 0 20px 0 !important;
}
.pa-cards__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.pa-card {
  background: var(--pa-card-bg);
  border: 1px solid var(--pa-card-border);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  text-decoration: none !important;
  color: inherit;
  transition: box-shadow 0.2s, transform 0.2s;
}
.pa-card:hover {
  box-shadow: 0 6px 18px rgba(68, 112, 153, 0.14);
  transform: translateY(-2px);
}
.pa-card__img {
  aspect-ratio: 16 / 9;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.pa-card__img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.pa-card__img-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  color: #aaaaaa;
}
.pa-card__img--path        { background: var(--pa-img-path-bg); }
.pa-card__img--prefiltered { background: var(--pa-img-prefiltered-bg); }

.pa-card__body {
  padding: 14px 16px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.pa-card__title {
  font-family: 'Open Sans', sans-serif !important;
  font-size: 15px !important;
  font-weight: 700 !important;
  color: var(--pa-card-title) !important;
  margin: 0 0 6px 0 !important;
  line-height: 1.3 !important;
}
.pa-card__desc {
  font-family: 'Open Sans', sans-serif !important;
  font-size: 13px !important;
  color: var(--pa-card-desc) !important;
  margin: 0 !important;
  line-height: 1.5 !important;
  flex: 1;
}
.pa-card__footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 12px;
}
.pa-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'Source Code Pro', 'Courier New', monospace !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: #ffffff !important;
}
.pa-badge--path { background-color: var(--pa-badge-path-bg); }

@media only screen and (max-width: 768px) {
  .pa-cards__grid { grid-template-columns: repeat(2, 1fr); }
}
@media only screen and (max-width: 480px) {
  .pa-cards__grid { grid-template-columns: 1fr; }
}
</style>
